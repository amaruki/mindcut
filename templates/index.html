<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MindCut</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <!-- Top Progress Overlay (used by app.js) -->
    <div id="topProgressWrap" class="topProgressWrap hide" aria-hidden="true">
      <div class="topProgressBar">
        <div id="topProgressBar" class="topProgressFill"></div>
      </div>
      <div id="topProgressText" class="topProgressText"></div>
    </div>
 
    <!-- Application Layout Shell -->
    <div class="app-layout">
      <!-- 1. Header -->
      <header class="app-header">
        <div class="header-left flex-row">
          <div class="brand-title">Mind<span>Cut</span></div>
          <div style="margin-left: 24px; display: flex; gap: 16px;">
            <a href="/" class="ghLink" style="font-weight: bold; color: var(--fg)">Editor Studio</a>
            <span style="color: var(--border)">|</span>
            <a href="/upload-manager" class="ghLink" style="font-weight: 500">Upload Manager</a>
            <span style="color: var(--border)">|</span>
            <a href="/scheduled" class="ghLink" style="font-weight: 500">Channel Videos</a>
            <span style="color: var(--border)">|</span>
            <a href="/settings" class="ghLink" style="font-weight: 500">Settings</a>
          </div>
        </div>
        <div class="header-right">
          <div class="langSwitch" role="group" aria-label="Language">
            <button id="langId" class="langBtn isActive" type="button" aria-label="Bahasa Indonesia" title="Bahasa Indonesia">
              <span>ID</span>
            </button>
            <button id="langEn" class="langBtn" type="button" aria-label="English" title="English">
              <span>EN</span>
            </button>
          </div>
          <a class="ghLink" href="https://github.com/amaruki" target="_blank" rel="noreferrer">
            <svg class="ghIcon" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
            </svg>
            <span>amaruki</span>
          </a>
        </div>
      </header>

      <!-- 2. Main 3-Column Workspace -->
      <main class="app-main">
        
        <!-- ==================== LEFT SIDEBAR: SOURCE & CORE SETUP ==================== -->
        <aside class="app-sidebar-left custom-scrollbar">
          <div class="panel">
            <div class="panelHead"><div class="panelTitle">Project Source</div></div>
            
            <div class="row">
              <label class="label" data-i18n="label.url">YouTube URL</label>
              <input id="url" class="input" placeholder="https://www.youtube.com/watch?v=..." data-i18n-placeholder="ph.url" />
            </div>

            <div id="preview" class="preview hide">
              <div class="thumb">
                <img id="thumbImg" alt="" />
              </div>
              <div class="pvMeta">
                <div id="pvTitle" class="pvTitle"></div>
                <div id="pvSub" class="pvSub"></div>
              </div>
            </div>
            
            <div class="row">
              <label class="label" data-i18n="label.cookies_browser">Browser (Cookies)</label>
              <select id="cookies_browser" class="input">
                <option value="" selected data-i18n="opt.cookies_browser.none">None (Tanpa login)</option>
                <option value="chrome">Chrome</option>
                <option value="edge">Edge</option>
                <option value="firefox">Firefox</option>
                <option value="brave">Brave</option>
                <option value="opera">Opera</option>
              </select>
            </div>

            <div class="row" style="margin-top: 10px;">
              <label class="label" data-i18n="label.mode">Mode</label>
              <select id="mode" class="input">
                <option value="heatmap" data-i18n="opt.mode.heatmap">Scan heatmap (Most Replayed)</option>
                <option value="ai" data-i18n="opt.mode.ai">AI Analysis (Transcript)</option>
                <option value="combined" data-i18n="opt.mode.combined">Combined (Heatmap + AI)</option>
                <option value="custom" data-i18n="opt.mode.custom">Custom start/end (manual)</option>
              </select>
            </div>

            <div id="customBox" class="grid2 hide">
              <div class="row">
                <label class="label" data-i18n="label.start">Start</label>
                <input id="start" class="input" placeholder="689 atau 11:29" data-i18n-placeholder="ph.start" />
              </div>
              <div class="row">
                <label class="label" data-i18n="label.end">End</label>
                <input id="end" class="input" placeholder="742 atau 12:22" data-i18n-placeholder="ph.end" />
              </div>
            </div>
          </div>

          <div class="panel action-panel">
            <div class="panelTitle mb-sm">Controls</div>
            <div class="actions-stack">
              <button id="scanBtn" class="btn primary-gradient" data-i18n="btn.scan">Scan Heatmap</button>
              <button id="scanCancelBtn" class="btn glass hide" type="button" data-i18n="btn.cancel_scan">Cancel Scan</button>
              <button id="clipBtn" class="btn secondary-solid" data-i18n="btn.clip">Buat Clip</button>
            </div>
            <div class="help text-center mt-xs" data-i18n="help.actions">Scan = cari heatmap. Buat Clip = proses.</div>
          </div>
        </aside>

        <!-- ==================== CENTER WORKSPACE: VISUALIZER ==================== -->
        <section class="app-workspace custom-scrollbar">
          
          <div id="scanProgress" class="scanProgress hide">
            <div class="scanBar"><div id="scanBarFill"></div></div>
            <div id="scanText" class="scanText"></div>
          </div>

          <!-- Segments Timeline / Grid -->
          <div class="panel visualizer-panel">
            <div class="panelHead align-center">
              <div class="panelTitle" data-i18n="panel.segments">Segments</div>
              <div class="panelRight">
                <div class="segMetaLine">
                  <div id="segSelectedMeta" class="panelMeta"></div>
                  <div id="segMeta" class="panelMeta"></div>
                </div>
                <div id="segControls" class="segControls hide">
                  <button id="segSelectAllBtn" class="btn glass smallBtn" type="button" data-i18n="btn.select_all">Select All</button>
                  <button id="segClearBtn" class="btn glass smallBtn" type="button" data-i18n="btn.clear">Clear</button>
                  <button id="segCreateBtn" class="btn primary-solid smallBtn" type="button" data-i18n="btn.create_selected">Create Selected</button>
                </div>
              </div>
            </div>
            
            <div id="segments" class="segments-visualizer"></div>
          </div>

          <!-- Split Workspace Footer: Progress & Metadata -->
          <div class="workspace-grid-bottom">
            <div class="panel job-tracker-panel">
              <div class="panelHead">
                <div class="panelTitle" data-i18n="panel.progress">Progress Tracker</div>
                <div id="jobMeta" class="panelMeta highlight"></div>
              </div>
              <div id="progress" class="progress"></div>
              <div id="outputs" class="outputs"></div>
            </div>

            <div id="metaPanel" class="panel meta-panel hide">
              <div class="panelHead">
                <div class="panelTitle" data-i18n="panel.metadata">Publishing Metadata</div>
              </div>
              <div id="metaContent" class="metaContent custom-scrollbar"></div>
            </div>
          </div>

          <!-- Gallery -->
          <div class="panel mt-md">
            <div class="panelHead">
              <div class="panelTitle" data-i18n="panel.gallery">Clip Gallery</div>
              <button id="refreshGalleryBtn" class="btn glass smallBtn" type="button" data-i18n="btn.refresh_gallery">Refresh</button>
            </div>
            <div id="gallery" class="galleryList grid-layout"></div>
          </div>

        </section>

        <!-- Right Sidebar removed, moved to Settings -->

      </main>
    </div>

    <!-- Modals -->
    <div id="modal" class="modal hide" role="dialog" aria-modal="true">
      <div class="modalBackdrop" id="modalBackdrop"></div>
      <div class="modalCard">
        <div class="modalTop">
          <div id="modalTitle" class="modalTitle"></div>
          <button id="modalClose" class="iconBtn" aria-label="Close">✕</button>
        </div>
        <div id="modalBody" class="modalBody custom-scrollbar"></div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
